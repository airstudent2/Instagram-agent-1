name: Instagram Auto-Reply Bot

on:
  schedule:
    - cron: "0 * * * *" # Runs at the top of every hour
  workflow_dispatch:
    inputs:
      post_url:
        description: "Instagram Post/Reel URL"
        required: false
        type: string
      keyword:
        description: "Trigger Keyword (case-insensitive)"
        required: false
        type: string
      reply_text:
        description: "Public Reply Text"
        required: false
        type: string

permissions:
  contents: write

# THIS IS THE FIX: Prevents overlapping runs and race conditions
concurrency:
  group: instagram-bot-state
  cancel-in-progress: false # Queues jobs instead of cancelling them

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main # Force checkout of the absolute latest main branch
          fetch-depth: 0 

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install requests

      - name: Run Bot Script
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          INPUT_POST_URL: ${{ inputs.post_url }}
          INPUT_KEYWORD: ${{ inputs.keyword }}
          INPUT_REPLY: ${{ inputs.reply_text }}
        run: python agent.py

      - name: Commit and Push State
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the database files
          git add rules.json processed_comments.json || true
          
          # Check if there are changes to commit
          if ! git diff-index --quiet HEAD; then
            echo "Changes detected. Committing and pushing..."
            git commit -m "chore: update bot state [skip ci]"
            
            # THE FIX: If there's a conflict during rebase, automatically favor the bot's local state
            git pull --rebase origin main -X theirs
            
            git push origin main
          else
            echo "No new comments processed or rules added. Nothing to commit."
          fi
